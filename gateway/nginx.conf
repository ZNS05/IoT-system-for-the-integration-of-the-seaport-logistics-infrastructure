events {}

http {
  upstream iot_controller_upstream {
    # Docker Compose DNS будет раздавать несколько IP для сервиса iot-controller (реплик)
    server iot-controller:8000;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://iot_controller_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
  }
}
