events {}

http {
  resolver 127.0.0.11 valid=5s;

  upstream iot_controller_upstream {
    zone iot_controller_upstream 64k;
    least_conn;

    # важно: resolve заставляет nginx пере-резолвить DNS и видеть новые реплики
    server iot-controller:8000 resolve max_fails=3 fail_timeout=10s;
  }

  server {
    listen 80;

    location / {
      proxy_pass http://iot_controller_upstream;
      proxy_http_version 1.1;

      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

      proxy_connect_timeout 3s;
      proxy_send_timeout 10s;
      proxy_read_timeout 10s;
      proxy_next_upstream error timeout http_502 http_503 http_504;
    }
  }
}
