global:
  scrape_interval: 5s

rule_files:
  - /etc/prometheus/alerts.rules.yml

scrape_configs:
  - job_name: "iot-controller"
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - "iot-controller"
        type: "A"
        port: 8000
        refresh_interval: 5s

  - job_name: "rule-engine"
    metrics_path: /metrics
    dns_sd_configs:
      - names:
          - "rule-engine"
        type: "A"
        port: 9101
        refresh_interval: 5s
