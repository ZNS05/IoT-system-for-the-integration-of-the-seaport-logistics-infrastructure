global:
  scrape_interval: 5s
  evaluation_interval: 5s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: "iot-controller"
    metrics_path: /metrics
    static_configs:
      - targets: ["iot-controller:8000"]

  - job_name: "rule-engine"
    metrics_path: /metrics
    static_configs:
      - targets: ["rule-engine:9101"]
