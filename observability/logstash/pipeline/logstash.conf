input {
  beats {
    port => 5044
  }
}

filter {
  # Filebeat присылает поле message (строка).
  # Если это JSON — распарсим и поднимем поля наверх.
  if [message] =~ "^\s*\{" {
    json {
      source => "message"
      target => "event"
      skip_on_invalid_json => true
    }

    # Пробросим часто нужные поля в top-level для удобных фильтров
    if [event][service] {
      mutate { add_field => { "[service][name]" => "%{[event][service]}" } }
    }

    if [event][level] {
      mutate { add_field => { "level" => "%{[event][level]}" } }
    }

    if [event][device_id] {
      mutate { add_field => { "device_id" => "%{[event][device_id]}" } }
    }

    if [event][event] {
      mutate { add_field => { "event_name" => "%{[event][event]}" } }
    }
  }
}

output {
  elasticsearch {
    hosts => ["http://elasticsearch:9200"]
    index => "iot-logs-%{+YYYY.MM.dd}"
  }

  # Полезно для отладки: видеть, что Logstash получил
  stdout { codec => rubydebug }
}
