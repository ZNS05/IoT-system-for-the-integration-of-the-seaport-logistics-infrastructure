version: "3.8"

services:
  mongo:
    image: mongo:8.0
    container_name: iot-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  rabbitmq:
    image: rabbitmq:3-management
    container_name: iot-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"

  rule-engine:
    build: ./rule-engine
    #container_name: rule-engine
    restart: unless-stopped
    environment:
      RABBIT_HOST: rabbitmq
      RABBIT_EXCHANGE: iot_data
      RABBIT_QUEUE: rule_engine_input
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: iot_port
      ALERTS_COLLECTION: alerts
    depends_on:
      - mongo
      - rabbitmq

  iot-controller:
    build: ./iot-controller
    #container_name: iot-controller
    restart: unless-stopped
    #ports:
     # - "8000:8000"
    environment:
      MONGO_URI: mongodb://mongo:27017
      RABBIT_HOST: rabbitmq
      RABBIT_EXCHANGE: iot_data
    depends_on:
      - mongo
      - rabbitmq

  data-simulator:
    build: ./data-simulator
    container_name: iot-data-simulator
    restart: unless-stopped
    depends_on:
      - iot-controller
    environment:
      API_URL: "http://iot-controller:8000/ingest"
      DEVICE_COUNT: "20"
      MSG_RATE_PER_DEVICE: "0.5"
      CRANE_RATIO: "0.2"
      FORKLIFT_RATIO: "0.5"
      TRUCK_RATIO: "0.3"
      OVERLOAD_PROB: "0.05"
      OVERHEAT_PROB: "0.10"

  gateway:
    image: nginx:alpine
    container_name: iot-gateway
    depends_on:
      - iot-controller
    ports:
      - "8000:80"
    volumes:
      - ./gateway/nginx.conf:/etc/nginx/nginx.conf:ro
    restart: unless-stopped


  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.14.3
    container_name: iot-elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    restart: unless-stopped

  kibana:
    image: docker.elastic.co/kibana/kibana:8.14.3
    container_name: iot-kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    restart: unless-stopped

  logstash:
    image: docker.elastic.co/logstash/logstash:8.14.3
    container_name: iot-logstash
    ports:
      - "5044:5044"
    volumes:
      - ./observability/logstash/pipeline:/usr/share/logstash/pipeline:ro
    depends_on:
      - elasticsearch
    restart: unless-stopped

  filebeat:
    image: docker.elastic.co/beats/filebeat:8.14.3
    container_name: iot-filebeat
    user: root
    command: ["--strict.perms=false", "-e", "-d", "*"]
    volumes:
      - ./observability/filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
    restart: unless-stopped


volumes:
  mongo_data:
  es_data:
